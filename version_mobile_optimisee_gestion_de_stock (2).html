<!DOCTYPE html>
<html lang="fr">
<head>
 <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#2196f3">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Gestion de stock de vis</title>

<style>
* { box-sizing: border-box; }

body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #f2f2f2;
}

.page { display: none; padding: 15px; }
.page.active { display: block; }

/* MENU */
.menu {
  min-height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  flex-direction: column;
  gap: 15px;
}

button {
  width: 100%;
  max-width: 350px;
  padding: 18px;
  font-size: 18px;
  border: none;
  border-radius: 12px;
  cursor: pointer;
}

.btn-stock { background: #2196f3; color: white; }
.btn-add { background: #4caf50; color: white; }

/* HEADER */
.header {
  display: flex;
  align-items: center;
  margin-bottom: 10px;
}

.back {
  width: 45px;
  height: 45px;
  border-radius: 50%;
  background: white;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 20px;
  cursor: pointer;
  box-shadow: 0 2px 6px rgba(0,0,0,0.3);
}

h2 {
  text-align: center;
}

/* FORM */
form {
  width: 100%;
  max-width: 400px;
  margin: 20px auto;
  display: flex;
  flex-direction: column;
  gap: 12px;
}

input {
  padding: 14px;
  font-size: 16px;
  border-radius: 8px;
  border: 1px solid #ccc;
}

/* MESSAGE */
#message {
  position: fixed;
  top: 15px;
  left: 50%;
  transform: translateX(-50%);
  background: #4caf50;
  color: white;
  padding: 12px 20px;
  border-radius: 8px;
  display: none;
  z-index: 999;
}

/* STOCK */
.stock-item {
  background: white;
  padding: 12px;
  border-radius: 10px;
  margin-top: 10px;
  display: flex;
  flex-direction: column;
  gap: 8px;
}

.stock-top {
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.stock-item button {
  padding: 8px;
  font-size: 14px;
  background: #f44336;
  color: white;
  border-radius: 6px;
}

h4 {
  margin-top: 20px;
}

</style>
</head>
<script>
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js');
}
</script>
<body>

<div id="message"></div>

<!-- POPUP RETIRER -->
<div id="popup" style="display:none; position:fixed; top:0; left:0; right:0; bottom:0; background:rgba(0,0,0,0.5); justify-content:center; align-items:center;">
  <div style="background:white; padding:20px; border-radius:12px; width:90%; max-width:300px;">
    <h3>Retirer</h3>
    <input id="removeQty" type="number" placeholder="Quantité" style="width:100%; margin-bottom:10px; padding:10px;">
    <button onclick="confirmRemove()">Valider</button>
    <button onclick="closePopup()" style="margin-top:10px; background:#ccc;">Annuler</button>
  </div>
</div>

<!-- MENU -->
<div id="menu" class="page active">
  <div class="menu">
    <button class="btn-stock" onclick="go('stock')">Voir le stock</button>
    <button class="btn-add" onclick="go('add')">Ajouter des vis</button>
  </div>
</div>

<!-- AJOUT -->
<div id="add" class="page">
  <div class="header">
    <span class="back" onclick="go('menu')">←</span>
  </div>

  <h2>Ajouter des vis</h2>
  <form onsubmit="addVis(event)">
    <input id="visName" placeholder="Nom" required>
    <input id="visSize" placeholder="Taille" required>
    <input id="visQty" type="number" placeholder="Quantité" required>
    <button type="submit">Ajouter</button>
  </form>
</div>

<!-- STOCK -->
<div id="stock" class="page">
  <div class="header">
    <span class="back" onclick="go('menu')">←</span>
  </div>

  <h2>Stock</h2>
  <h3 id="total"></h3>
  <div id="list"></div>
</div>

<script>
let stock = JSON.parse(localStorage.getItem('stock')) || {};

function go(page) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.getElementById(page).classList.add('active');
  if (page === 'stock') render();
  if (page === 'menu') document.querySelectorAll('form').forEach(f => f.reset());
}

function msg(text) {
  const m = document.getElementById('message');
  m.textContent = text;
  m.style.display = 'block';
  setTimeout(() => m.style.display = 'none', 1200);
}

function addVis(e) {
  e.preventDefault();

  const name = document.getElementById('visName').value.trim();
  const size = document.getElementById('visSize').value.trim();
  const qty = parseInt(document.getElementById('visQty').value);

  if (!name || !size || isNaN(qty) || qty <= 0) return;

  if (!stock[name]) stock[name] = {};
  if (!stock[name][size]) stock[name][size] = 0;

  stock[name][size] += qty;
  localStorage.setItem('stock', JSON.stringify(stock));

  msg('Ajout réussi');
  go('menu');
}

function render() {
  const list = document.getElementById('list');
  const totalEl = document.getElementById('total');
  list.innerHTML = '';

  let total = 0;
  for (let n in stock) {
    for (let s in stock[n]) {
      total += stock[n][s];
    }
  }
  totalEl.textContent = 'Total : ' + total;

  for (let n in stock) {
    const h = document.createElement('h4');
    h.textContent = n;
    list.appendChild(h);

    for (let s in stock[n]) {
      const row = document.createElement('div');
      row.className = 'stock-item';

      const top = document.createElement('div');
      top.className = 'stock-top';

      const span = document.createElement('span');
      span.textContent = s + ' : ' + stock[n][s];

      const btn = document.createElement('button');
      btn.type = 'button';
      btn.textContent = 'Retirer';

      // stocker les infos directement dans le bouton (fiable)
      btn.dataset.name = n;
      btn.dataset.size = s;

      btn.onclick = function () {
        const name = this.dataset.name;
        const size = this.dataset.size;

        const input = prompt('Combien retirer ?', '1');
        const val = parseInt(input);

        if (isNaN(val) || val <= 0) return;

        stock[name][size] -= val;

        if (stock[name][size] <= 0) delete stock[name][size];
        if (Object.keys(stock[name]).length === 0) delete stock[name];

        localStorage.setItem('stock', JSON.stringify(stock));
        render();
      };

      top.appendChild(span);
      top.appendChild(btn);
      row.appendChild(top);
      list.appendChild(row);
    }
  }
}
</script>

</body>
</html>
